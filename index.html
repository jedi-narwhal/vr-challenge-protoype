<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Sim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { background: #07090f; }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.6; transform: translate(-50%,-50%) scale(1.3); }
  }
  @keyframes pulseBtn {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes borderGlow {
    0%,100% { box-shadow: 0 0 6px rgba(249,115,22,0.2); }
    50% { box-shadow: 0 0 14px rgba(249,115,22,0.5); }
  }
  input[type=range] {
    width: 100%; height: 4px; appearance: none; -webkit-appearance: none;
    background: rgba(8,145,178,0.25); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #06d6a0; cursor: pointer;
    box-shadow: 0 0 8px rgba(6,214,160,0.3);
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: #06d6a0; cursor: pointer; border: none;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(8,145,178,0.3); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const COLORS = {
  bg: "#0a0e1a",
  panel: "rgba(8,145,178,0.08)",
  panelBorder: "rgba(8,145,178,0.25)",
  teal: "#0891b2",
  tealGlow: "rgba(8,145,178,0.4)",
  mint: "#06d6a0",
  mintGlow: "rgba(6,214,160,0.3)",
  orange: "#f97316",
  red: "#ef4444",
  white: "#f0fdfa",
  muted: "#64748b",
  text: "#cbd5e1",
  darkCard: "rgba(15,23,42,0.7)",
};

const PRODUCTS = [
  { id: 1, name: "Organic Oats",  brand: "NatureFarm",  price: 5.99, x: 15, y: 52, shelf: "top", color: "#06d6a0", engagement: 72, icon: "🥣" },
  { id: 2, name: "Protein Bar",   brand: "FitBite",     price: 3.49, x: 30, y: 55, shelf: "top", color: "#f97316", engagement: 85, icon: "💪" },
  { id: 3, name: "Green Tea",     brand: "ZenLeaf",     price: 4.29, x: 45, y: 52, shelf: "top", color: "#0891b2", engagement: 64, icon: "🍵" },
  { id: 4, name: "Trail Mix",     brand: "NutHouse",    price: 6.99, x: 60, y: 55, shelf: "mid", color: "#a78bfa", engagement: 58, icon: "🥜" },
  { id: 5, name: "Kombucha",      brand: "FizzCulture", price: 3.99, x: 75, y: 52, shelf: "mid", color: "#f472b6", engagement: 91, icon: "🫧" },
  { id: 6, name: "Granola",       brand: "CrunchTime",  price: 7.49, x: 22, y: 70, shelf: "low", color: "#fbbf24", engagement: 47, icon: "🌾" },
  { id: 7, name: "Almond Milk",   brand: "PureBrew",    price: 4.99, x: 52, y: 70, shelf: "low", color: "#34d399", engagement: 76, icon: "🥛" },
  { id: 8, name: "Energy Drink",  brand: "VoltUp",      price: 2.99, x: 68, y: 73, shelf: "low", color: "#fb923c", engagement: 69, icon: "⚡" },
];

const SHOPPERS = [
  { id: 1, type: "Health-conscious", path: [15,30,45,60,75], speed: 1.2 },
  { id: 2, type: "Budget buyer",     path: [75,60,45,22,52], speed: 0.8 },
  { id: 3, type: "Impulse buyer",    path: [45,75,30,68,15], speed: 1.5 },
];

function HeatmapOverlay({ products, visible }) {
  if (!visible) return null;
  return products.map(p => (
    <div key={p.id} style={{
      position: "absolute", left: `${p.x}%`, top: `${p.y}%`,
      width: p.engagement * 1.8, height: p.engagement * 1.8,
      borderRadius: "50%",
      background: `radial-gradient(circle, ${p.engagement > 70 ? "rgba(239,68,68,0.35)" : p.engagement > 50 ? "rgba(249,115,22,0.3)" : "rgba(8,145,178,0.25)"} 0%, transparent 70%)`,
      transform: "translate(-50%,-50%)",
      zIndex: 5, pointerEvents: "none",
    }} />
  ));
}

function ProductNode({ product, isManagerView, selected, onClick, priceMod }) {
  const displayPrice = (product.price * (1 + priceMod / 100)).toFixed(2);
  return (
    <div onClick={() => onClick(product)} style={{
      position: "absolute", left: `${product.x}%`, top: `${product.y}%`,
      transform: "translate(-50%,-50%)", cursor: "pointer", zIndex: 15,
    }}>
      <div style={{
        width: 48, height: 48, borderRadius: 10,
        background: selected ? product.color + "30" : COLORS.darkCard,
        border: `2px solid ${selected ? product.color : "rgba(255,255,255,0.1)"}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        backdropFilter: "blur(8px)",
        boxShadow: selected ? `0 0 20px ${product.color}40` : "0 4px 12px rgba(0,0,0,0.3)",
        transition: "all 0.3s ease",
      }}>
        <span style={{ fontSize: 20 }}>{product.icon}</span>
      </div>
      {isManagerView && (
        <div style={{
          position: "absolute", top: -20, left: "50%", transform: "translateX(-50%)",
          background: COLORS.darkCard, border: `1px solid ${COLORS.panelBorder}`,
          borderRadius: 5, padding: "2px 6px", whiteSpace: "nowrap",
        }}>
          <span style={{ fontSize: 9, color: COLORS.mint, fontFamily: "'JetBrains Mono', monospace" }}>${displayPrice}</span>
        </div>
      )}
      <div style={{
        textAlign: "center", marginTop: 3,
        fontSize: 8, color: COLORS.text, fontFamily: "'DM Sans', sans-serif",
        textShadow: "0 1px 4px rgba(0,0,0,0.9)",
      }}>{product.name}</div>
    </div>
  );
}

function ShopperAvatar({ shopper, time }) {
  const pathIdx = Math.floor((time * shopper.speed) % shopper.path.length);
  const x = shopper.path[pathIdx];
  const y = 61 + Math.sin(time * 0.5 + shopper.id) * 6;
  return (
    <div style={{
      position: "absolute", left: `${x}%`, top: `${y}%`,
      transform: "translate(-50%,-50%)", zIndex: 20,
      transition: "left 1.5s ease, top 1.5s ease",
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: "50%",
        background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.mint})`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 13, boxShadow: `0 0 12px ${COLORS.tealGlow}`,
        border: "2px solid rgba(255,255,255,0.2)",
      }}>🧑</div>
      <div style={{
        position: "absolute", top: -14, left: "50%", transform: "translateX(-50%)",
        fontSize: 7, color: COLORS.mint, whiteSpace: "nowrap",
        fontFamily: "'JetBrains Mono', monospace",
        textShadow: "0 1px 4px rgba(0,0,0,0.9)",
      }}>{shopper.type}</div>
    </div>
  );
}

function MetricCard({ label, value, change, icon }) {
  const pos = change >= 0;
  return (
    <div style={{
      background: COLORS.darkCard, border: `1px solid ${COLORS.panelBorder}`,
      borderRadius: 8, padding: "8px 10px",
    }}>
      <div style={{ fontSize: 9, color: COLORS.muted, fontFamily: "'DM Sans', sans-serif", marginBottom: 1 }}>{icon} {label}</div>
      <div style={{ fontSize: 18, color: COLORS.white, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>{value}</div>
      <div style={{ fontSize: 9, color: pos ? COLORS.mint : COLORS.red, fontFamily: "'JetBrains Mono', monospace" }}>
        {pos ? "▲" : "▼"} {Math.abs(change)}%
      </div>
    </div>
  );
}

function MiniBarChart({ data }) {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{
      background: COLORS.darkCard, border: `1px solid ${COLORS.panelBorder}`,
      borderRadius: 8, padding: 10,
    }}>
      <div style={{ fontSize: 9, color: COLORS.muted, marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>📈 Weekly Foot Traffic</div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 48 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{
              width: "100%", height: `${(d.value / max) * 40}px`,
              background: `linear-gradient(to top, ${COLORS.teal}, ${COLORS.mint})`,
              borderRadius: "2px 2px 0 0", transition: "height 0.5s ease",
            }} />
            <div style={{ fontSize: 6, color: COLORS.muted, marginTop: 2, fontFamily: "'JetBrains Mono', monospace" }}>{d.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Slider({ label, value, onChange, min, max, unit = "", hint = "" }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
        <span style={{ fontSize: 9, color: COLORS.text, fontFamily: "'DM Sans', sans-serif" }}>{label}</span>
        <span style={{ fontSize: 9, color: COLORS.mint, fontFamily: "'JetBrains Mono', monospace" }}>{value}{unit}</span>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={e => onChange(Number(e.target.value))} />
      {hint && <div style={{ fontSize: 7, color: COLORS.muted, marginTop: 2, fontFamily: "'JetBrains Mono', monospace", opacity: 0.7 }}>{hint}</div>}
    </div>
  );
}

function App() {
  const [view, setView]                   = useState("consumer");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [showHeatmap, setShowHeatmap]     = useState(true);
  const [priceMod, setPriceMod]           = useState(0);
  const [shelfLayout, setShelfLayout]     = useState(50);
  const [promoIntensity, setPromoIntensity] = useState(30);
  const [time, setTime]                   = useState(0);

  const isManager = view === "manager";

  useEffect(() => {
    const id = setInterval(() => setTime(t => t + 1), 1500);
    return () => clearInterval(id);
  }, []);

  const engagement = Math.round(68 + priceMod * -0.3 + promoIntensity * 0.2 + Math.sin(time) * 2);
  const conversion = Math.round(23 + promoIntensity * 0.15 + priceMod * -0.1);
  const revenue    = Math.round(4200 + priceMod * 30 + promoIntensity * 12 + shelfLayout * 5);
  const dwellTime  = (2.4 + promoIntensity * 0.02 - priceMod * 0.005).toFixed(1);

  const chartData = [
    { label: "Mon", value: 45 + Math.sin(time * 0.3) * 5 },
    { label: "Tue", value: 62 + Math.cos(time * 0.2) * 8 },
    { label: "Wed", value: 58 + Math.sin(time * 0.4) * 4 },
    { label: "Thu", value: 71 + Math.cos(time * 0.3) * 6 },
    { label: "Fri", value: 84 + Math.sin(time * 0.5) * 3 },
    { label: "Sat", value: 93 + Math.cos(time * 0.1) * 7 },
    { label: "Sun", value: 67 + Math.sin(time * 0.6) * 5 },
  ];

  const SIDEBAR_W = 240;

  return (
    <div style={{ width: "100%", height: "100vh", background: COLORS.bg, fontFamily: "'DM Sans', sans-serif", overflow: "hidden", position: "relative" }}>

      {/* Scanline */}
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 100,
        background: "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px)" }}>
        <div style={{ width: "100%", height: 2,
          background: `linear-gradient(90deg, transparent, ${COLORS.tealGlow}, transparent)`,
          animation: "scanline 4s linear infinite", opacity: 0.3 }} />
      </div>

      {/* Grid bg */}
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none",
        backgroundImage: `linear-gradient(rgba(8,145,178,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(8,145,178,0.04) 1px, transparent 1px)`,
        backgroundSize: "40px 40px" }} />

      {/* TOP BAR */}
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: 48,
        background: "rgba(10,14,26,0.95)", borderBottom: `1px solid ${COLORS.panelBorder}`,
        backdropFilter: "blur(16px)", zIndex: 50,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 16px",
      }}>
        {/* Logo */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            fontSize: 15, fontFamily: "'Orbitron', sans-serif", fontWeight: 900,
            background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.mint})`,
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            letterSpacing: 2,
          }}>CUSTOMER SIM</div>
          <div style={{ fontSize: 8, color: COLORS.muted, background: "rgba(255,255,255,0.05)",
            padding: "2px 6px", borderRadius: 3, fontFamily: "'JetBrains Mono', monospace" }}>MR SIM v2.0</div>
        </div>

        {/* Toggle */}
        <div style={{ display: "flex", gap: 2, background: "rgba(255,255,255,0.05)", borderRadius: 7, padding: 3 }}>
          {["consumer","manager"].map(v => (
            <button key={v} onClick={() => { setView(v); setSelectedProduct(null); }} style={{
              padding: "5px 12px", border: "none", borderRadius: 5, cursor: "pointer",
              fontSize: 10, fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
              transition: "all 0.3s ease",
              background: view === v ? `linear-gradient(135deg, ${COLORS.teal}, ${v === "manager" ? COLORS.mint : COLORS.teal})` : "transparent",
              color: view === v ? "#fff" : COLORS.muted,
              boxShadow: view === v ? `0 0 12px ${COLORS.tealGlow}` : "none",
            }}>
              {v === "consumer" ? "👁 Consumer" : "📊 Manager"}
            </button>
          ))}
        </div>

        {/* Live indicator */}
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: COLORS.mint,
            boxShadow: `0 0 8px ${COLORS.mintGlow}`, animation: "pulseBtn 2s ease-in-out infinite" }} />
          <span style={{ fontSize: 9, color: COLORS.mint, fontFamily: "'JetBrains Mono', monospace" }}>LIVE</span>
        </div>
      </div>

      {/* STORE AREA */}
      <div style={{
        position: "absolute", top: 48, left: 0,
        right: isManager ? SIDEBAR_W : 0,
        bottom: 0, transition: "right 0.4s ease", overflow: "hidden",
      }}>
        {/* Shelf lines */}
        {[50, 66, 80].map((y, i) => (
          <div key={i} style={{
            position: "absolute", left: "6%", right: "6%", top: `${y}%`,
            height: 1, background: `linear-gradient(90deg, transparent, ${COLORS.panelBorder}, transparent)`,
          }} />
        ))}

        {/* Aisle labels */}
        {["HEALTH & WELLNESS", "SNACKS & BARS", "BEVERAGES"].map((aisle, i) => (
          <div key={i} style={{
            position: "absolute", left: `${8 + i * 33}%`, top: "42%",
            fontSize: 7, color: COLORS.muted, letterSpacing: 3,
            fontFamily: "'JetBrains Mono', monospace",
            textTransform: "uppercase", opacity: 0.4,
            transform: "rotate(-90deg)", transformOrigin: "left center",
            whiteSpace: "nowrap",
          }}>{aisle}</div>
        ))}

        {/* Heatmap */}
        <HeatmapOverlay products={PRODUCTS} visible={isManager && showHeatmap} />

        {/* Products */}
        {PRODUCTS.map(p => (
          <ProductNode key={p.id} product={p} isManagerView={isManager}
            selected={selectedProduct?.id === p.id}
            onClick={setSelectedProduct} priceMod={priceMod} />
        ))}

        {/* Shoppers */}
        {SHOPPERS.map(s => <ShopperAvatar key={s.id} shopper={s} time={time} />)}

        {/* Consumer legend */}
        {!isManager && (
          <div style={{
            position: "absolute", top: 12, left: 12,
            background: COLORS.darkCard, border: `1px solid ${COLORS.panelBorder}`,
            borderRadius: 10, padding: "10px 13px", backdropFilter: "blur(12px)", zIndex: 30,
            animation: "fadeIn 0.3s ease",
          }}>
            <div style={{ fontSize: 9, color: COLORS.muted, marginBottom: 5, fontFamily: "'JetBrains Mono', monospace" }}>CONSUMER PERSPECTIVE</div>
            <div style={{ fontSize: 10, color: COLORS.text, lineHeight: 1.7 }}>
              🧑 Tap products to inspect<br/>
              🛒 Shoppers moving through aisles<br/>
              📍 Experience the store as a customer
            </div>
            <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${COLORS.panelBorder}` }}>
              <span style={{ fontSize: 8, color: COLORS.mint, fontFamily: "'JetBrains Mono', monospace", animation: "pulseBtn 2s ease-in-out infinite", display: "inline-block" }}>
                ▶ Switch to Manager View to see analytics →
              </span>
            </div>
          </div>
        )}

        {/* Consumer product detail panel */}
        {!isManager && selectedProduct && (
          <div style={{
            position: "absolute", bottom: 16, left: 16, right: 16,
            background: COLORS.darkCard, border: `1px solid ${COLORS.panelBorder}`,
            borderRadius: 12, padding: 16, backdropFilter: "blur(16px)",
            animation: "fadeIn 0.3s ease", zIndex: 30,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: COLORS.white }}>{selectedProduct.name}</div>
                <div style={{ fontSize: 11, color: selectedProduct.color, marginTop: 2 }}>{selectedProduct.brand}</div>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, color: COLORS.mint, fontFamily: "'JetBrains Mono', monospace" }}>
                ${selectedProduct.price.toFixed(2)}
              </div>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 10, flexWrap: "wrap" }}>
              <div style={{ fontSize: 10, color: COLORS.muted }}>📍 Shelf: <span style={{ color: COLORS.text }}>{selectedProduct.shelf}</span></div>
              <div style={{ fontSize: 10, color: COLORS.muted }}>👁 Eye tracking: <span style={{ color: COLORS.text }}>2.3s avg</span></div>
              <div style={{ fontSize: 10, color: COLORS.muted }}>🛒 Pick-up rate: <span style={{ color: COLORS.text }}>34%</span></div>
            </div>
            <button onClick={() => setSelectedProduct(null)} style={{
              position: "absolute", top: 10, right: 12, background: "none", border: "none",
              color: COLORS.muted, fontSize: 15, cursor: "pointer",
            }}>✕</button>
          </div>
        )}
      </div>

      {/* MANAGER SIDEBAR */}
      {isManager && (
        <div style={{
          position: "absolute", top: 48, right: 0, bottom: 0, width: SIDEBAR_W,
          background: "rgba(10,14,26,0.97)", borderLeft: `1px solid ${COLORS.panelBorder}`,
          backdropFilter: "blur(16px)", overflowY: "auto", zIndex: 40,
          animation: "fadeIn 0.4s ease", padding: "14px 12px",
        }}>
          {/* Analytics header */}
          <div style={{ fontSize: 10, color: COLORS.teal, fontWeight: 700, marginBottom: 10,
            fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1,
            display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            📊 LIVE ANALYTICS
            <span style={{ fontSize: 7, color: COLORS.mint, background: "rgba(6,214,160,0.1)",
              border: `1px solid ${COLORS.mint}`, borderRadius: 3, padding: "2px 5px",
              animation: "pulseBtn 2s ease-in-out infinite" }}>LIVE</span>
          </div>

          {/* Metric cards */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 10 }}>
            <MetricCard label="Engagement" value={`${engagement}%`} change={3.2}  icon="👁" />
            <MetricCard label="Conversion"  value={`${conversion}%`} change={-1.5} icon="🛒" />
            <MetricCard label="Rev/Day"     value={`$${revenue}`}    change={5.8}  icon="💰" />
            <MetricCard label="Dwell"       value={`${dwellTime}m`}  change={2.1}  icon="⏱" />
          </div>

          <MiniBarChart data={chartData} />

          {/* Controls */}
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, color: COLORS.teal, fontWeight: 700, marginBottom: 8,
              fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1 }}>🎛 CONTROLS</div>
            <Slider label="Price Adjustment" value={priceMod} onChange={setPriceMod} min={-20} max={20} unit="%" hint="↑ price = higher revenue, lower engagement" />
            <Slider label="Shelf Density"    value={shelfLayout} onChange={setShelfLayout} min={20} max={80} hint="↑ density = more SKUs visible per aisle" />
            <Slider label="Promo Intensity"  value={promoIntensity} onChange={setPromoIntensity} min={0} max={100} unit="%" hint="↑ promos = longer dwell, more conversions" />
          </div>

          {/* Heatmap button */}
          <button onClick={() => setShowHeatmap(h => !h)} style={{
            width: "100%", marginTop: 10, padding: "8px 10px",
            border: `1px solid ${showHeatmap ? COLORS.mint : COLORS.orange}`,
            borderRadius: 7, cursor: "pointer", fontSize: 10,
            fontFamily: "'DM Sans', sans-serif",
            background: showHeatmap ? "rgba(6,214,160,0.1)" : "rgba(249,115,22,0.1)",
            color: showHeatmap ? COLORS.mint : COLORS.orange,
            transition: "all 0.3s ease",
            animation: showHeatmap ? "none" : "borderGlow 2s ease-in-out infinite",
          }}>
            🔥 {showHeatmap ? "Hide Heatmap" : "Show Attention Heatmap ✦"}
          </button>

          {/* Selected product detail */}
          {selectedProduct && (
            <div style={{ marginTop: 10, background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}`,
              borderRadius: 8, padding: 10, animation: "fadeIn 0.3s ease" }}>
              <div style={{ fontSize: 10, color: COLORS.teal, fontWeight: 700, marginBottom: 5,
                fontFamily: "'JetBrains Mono', monospace" }}>
                SELECTED: {selectedProduct.name.toUpperCase()}
              </div>
              <div style={{ fontSize: 9, color: COLORS.text, lineHeight: 1.7 }}>
                Brand: {selectedProduct.brand}<br/>
                Engagement: <span style={{ color: COLORS.mint }}>{selectedProduct.engagement}%</span><br/>
                Shelf: {selectedProduct.shelf}<br/>
                Base: ${selectedProduct.price.toFixed(2)}<br/>
                Modified: <span style={{ color: priceMod !== 0 ? COLORS.orange : COLORS.text }}>
                  ${(selectedProduct.price * (1 + priceMod / 100)).toFixed(2)}
                </span>
              </div>
            </div>
          )}

          {/* Info tip */}
          <div style={{ marginTop: 10, padding: "7px 9px", background: "rgba(8,145,178,0.05)",
            borderRadius: 7, border: `1px solid rgba(8,145,178,0.15)` }}>
            <div style={{ fontSize: 8, color: COLORS.muted, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.5 }}>
              ℹ️ Adjust sliders to see real-time impact on consumer behavior and revenue metrics. Toggle heatmap to visualize attention patterns.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
